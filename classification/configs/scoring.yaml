scenario_thresholds:
  emergency_enter: 0.58
  emergency_exit: 0.50
  hazard_enter: 0.30
  hazard_exit: 0.24
  elevated_enter: 0.10
  no_fire_risk_max: 0.06

review:
  escalation_window_seconds: 30
